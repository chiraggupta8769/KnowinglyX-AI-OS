services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - open-webui:/app/backend/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowinglyx-postgres
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai123
      POSTGRES_DB: knowinglyx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowinglyx-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: knowinglyx-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: knowinglyx
      DB_POSTGRESDB_USER: ai
      DB_POSTGRESDB_PASSWORD: ai123
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  open-webui:
  postgres_data:
  qdrant_data:
  n8n_data:
